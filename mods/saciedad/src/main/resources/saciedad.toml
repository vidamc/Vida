# Saciedad — конфигурация шкалы насыщения
# Все значения имеют умолчания; файл можно не создавать.

# Цвет заливки шкалы в ARGB hex (rrggbb или aarrggbb).
# По умолчанию — янтарный полностью непрозрачный.
color = "FFFFA500"

# Показывать шкалу даже если насыщение равно нулю.
mostrarSiempre = false

# Позиция шкалы насыщения относительно шкалы голода:
#   arriba — над шкалой голода
#   abajo  — под шкалой голода (по умолчанию)
#   encima — поверх шкалы голода
posicion = "abajo"
