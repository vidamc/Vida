# -----------------------------------------------------------------------------
#  OpenSSF Scorecard — проверяет security posture проекта (branch protection,
#  signed commits, pinned actions, vulnerabilities, SAST coverage, …).
#
#  Результаты отправляются в Security tab (SARIF) + в публичный Scorecard API,
#  который удобно прикрутить бейджем к README.
# -----------------------------------------------------------------------------

name: scorecard

on:
  branch_protection_rule: {}
  schedule:
    - cron: '22 5 * * 2'  # Вторник 05:22 UTC
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 14

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
