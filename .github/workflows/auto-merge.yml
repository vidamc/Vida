# -----------------------------------------------------------------------------
#  Auto-merge — при успешном прохождении всех CI-проверок PR автоматически
#  мержится в main (squash). Работает только для PR, созданных участниками
#  организации vidamc или release-please-ботом.
# -----------------------------------------------------------------------------

name: auto-merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      (
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        github.event.pull_request.user.login == 'release-please[bot]' ||
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER'
      )
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
