# -----------------------------------------------------------------------------
#  Vida Release — triggered when release-please (or a manual tag push) creates
#  a new GitHub Release. Строит артефакты и прикладывает их к релизу:
#
#    * fat-jar (vida-installer-X.Y.Z.jar)           — универсальный инсталлятор
#    * vida-loader-X.Y.Z.jar                        — загрузчик (Java-агент)
#    * vida-core/base/manifest/...                   — API-модули
#    * vida-saciedad / vida-senda (опционально)  — если каталоги mods/* в дереве
#    * SHA256SUMS / SHA512SUMS
#    * CycloneDX SBOM (Syft → .cdx.json)
#    * *.sig / *.pem                                — Sigstore keyless подписи
#
#  Sigstore (cosign) работает через OIDC-токен GitHub Actions, без секретов.
# -----------------------------------------------------------------------------

name: release

on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to attach artifacts to (e.g. v0.2.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  #  1. Сборка всех JAR-артефактов (OS-independent).
  # ---------------------------------------------------------------------------
  build-universal:
    name: Universal artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euxo pipefail
          v=$(./gradlew -q printVersion | tail -n1 | tr -d '[:space:]')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build all jars
        shell: bash
        run: ./gradlew --no-daemon build :installer:fatJar

      - name: Stage universal artifacts
        shell: bash
        run: |
          set -euxo pipefail
          v='${{ steps.ver.outputs.version }}'
          mkdir -p dist

          copy_jar() {
            local module="$1" name="$2"
            local src
            src=$(ls "${module}/build/libs/${name}-"*.jar \
                | grep -Ev '\-(thin|sources|javadoc|jmh)\.jar$' | head -n1)
            [ -n "$src" ] && cp "$src" "dist/vida-${name}-${v}.jar"
          }

          # Моды из поддерева mods/ подключаются в Gradle только при наличии каталога — не вызывать ls по отсутствующим путям.
          copy_jar_if_present() {
            local module="$1" name="$2"
            local d="${module}/build/libs"
            [ -d "$d" ] || return 0
            shopt -s nullglob
            local -a jars=( "$d"/${name}-*.jar )
            shopt -u nullglob
            local f
            for f in "${jars[@]}"; do
              [[ "$f" =~ -(thin|sources|javadoc|jmh)\.jar$ ]] && continue
              cp "$f" "dist/vida-${name}-${v}.jar"
              return 0
            done
          }

          # Installer (fat-jar)
          fat=$(ls installer/build/libs/installer-*.jar \
              | grep -Ev '\-(thin|sources|javadoc)\.jar$' | head -n1)
          cp "$fat" "dist/vida-installer-${v}.jar"

          # Core platform
          copy_jar core core
          copy_jar manifest manifest
          copy_jar config config
          copy_jar cartografia cartografia
          copy_jar discovery discovery
          copy_jar resolver resolver
          copy_jar vifada vifada
          copy_jar loader loader
          copy_jar base base
          copy_jar cima cima

          # API / runtime
          copy_jar bloque bloque
          copy_jar objeto objeto
          copy_jar susurro susurro
          copy_jar puertas puertas
          copy_jar vigia vigia
          copy_jar entidad entidad
          copy_jar mundo mundo
          copy_jar render render
          copy_jar red red

          # Mods (только если каталоги есть в checkout)
          copy_jar_if_present mods/saciedad saciedad
          copy_jar_if_present mods/senda senda

          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-universal
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  2. Checksums, Sigstore-подпись, upload в GitHub Release.
  # ---------------------------------------------------------------------------
  publish:
    name: Checksums + Sigstore + GitHub Release
    runs-on: ubuntu-latest
    needs: [build-universal]
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staged

      - name: Collect into dist/
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          find staged -type f -name '*.jar' -exec cp {} dist/ \;
          ls -la dist

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          set -euxo pipefail
          ( cd . && sha256sum * | sort -k2 ) > SHA256SUMS
          ( cd . && sha512sum * | sort -k2 ) > SHA512SUMS
          cat SHA256SUMS

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.18.0

      - name: CycloneDX SBOM from staged JARs
        shell: bash
        working-directory: dist
        run: |
          set -euxo pipefail
          syft packages dir:. -o cyclonedx-json=vida-${{ needs.build-universal.outputs.version }}-sbom.cdx.json
          ls -la *.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Sign artifacts with Sigstore (keyless OIDC)
        shell: bash
        working-directory: dist
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euxo pipefail
          for f in *.jar; do
            cosign sign-blob --yes "$f" \
              --output-signature   "${f}.sig" \
              --output-certificate "${f}.pem"
          done
          ls -la

      - name: Build-provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*.jar'

      - name: Resolve release reference
        id: ref
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/*.jar
            dist/*.sig
            dist/*.pem
            dist/*.cdx.json
            dist/SHA256SUMS
            dist/SHA512SUMS
