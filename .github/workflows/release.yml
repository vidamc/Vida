# -----------------------------------------------------------------------------
#  Vida Release — triggered when release-please (or a manual tag push) creates
#  a new GitHub Release. Строит артефакты и прикладывает их к релизу:
#
#    * fat-jar (vida-installer-X.Y.Z.jar)           — Linux-сборка, одинаковый
#                                                     для всех ОС
#    * vida-installer-linux-x64-X.Y.Z.deb           — jpackage, Ubuntu
#    * vida-installer-windows-x64-X.Y.Z.msi         — jpackage, Windows
#    * vida-installer-macos-x64-X.Y.Z.dmg           — jpackage, macOS
#    * loader.jar / api-*-jars                      — для gradle-потребителей
#    * SHA256SUMS / SHA512SUMS
#    * *.sig / *.pem                                — Sigstore keyless подписи
#
#  Sigstore (cosign) работает через OIDC-токен GitHub Actions, без секретов.
# -----------------------------------------------------------------------------

name: release

on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to attach artifacts to (e.g. v0.2.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  #  1. Универсальные (OS-independent) артефакты: fat-jar + module jars.
  # ---------------------------------------------------------------------------
  build-universal:
    name: Universal artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euxo pipefail
          v=$(./gradlew -q printVersion | tail -n1 | tr -d '[:space:]')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build all jars
        shell: bash
        run: ./gradlew --no-daemon build :installer:fatJar

      - name: Stage universal artifacts
        shell: bash
        run: |
          set -euxo pipefail
          v='${{ steps.ver.outputs.version }}'
          mkdir -p dist

          copy_jar() {
            local module="$1" name="$2"
            local src
            src=$(ls "${module}/build/libs/${name}-"*.jar \
                | grep -Ev '\-(thin|sources|javadoc|jmh)\.jar$' | head -n1)
            [ -n "$src" ] && cp "$src" "dist/vida-${name}-${v}.jar"
          }

          # Installer (fat-jar)
          fat=$(ls installer/build/libs/installer-*.jar \
              | grep -Ev '\-(thin|sources|javadoc)\.jar$' | head -n1)
          cp "$fat" "dist/vida-installer-${v}.jar"

          # Core platform
          copy_jar core core
          copy_jar manifest manifest
          copy_jar config config
          copy_jar cartografia cartografia
          copy_jar discovery discovery
          copy_jar resolver resolver
          copy_jar vifada vifada
          copy_jar loader loader
          copy_jar base base

          # API / runtime
          copy_jar bloque bloque
          copy_jar objeto objeto
          copy_jar susurro susurro
          copy_jar puertas puertas
          copy_jar vigia vigia
          copy_jar entidad entidad
          copy_jar mundo mundo
          copy_jar render render
          copy_jar red red

          # Mods
          copy_jar mods/saciedad saciedad
          copy_jar mods/senda senda
          copy_jar mods/valenta valenta

          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-universal
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  2. Нативный инсталлятор на каждой ОС через jpackage.
  #     Матрица обязательно включает хост-ОС: jpackage умеет собирать пакеты
  #     только под платформу, на которой он запущен.
  # ---------------------------------------------------------------------------
  build-native:
    name: Native installer (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            pkg-type: deb
            ext: deb
          - os: windows-latest
            label: windows-x64
            pkg-type: msi
            ext: msi
          - os: macos-latest
            label: macos-x64
            pkg-type: dmg
            ext: dmg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fakeroot binutils

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euxo pipefail
          v=$(./gradlew -q printVersion | tail -n1 | tr -d '[:space:]')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: jpackage
        shell: bash
        run: |
          set -euxo pipefail
          ./gradlew --no-daemon :installer:vidaNativePackage \
            -PvidaInstallerType=${{ matrix.pkg-type }} \
            -PvidaInstallerNameSuffix=${{ matrix.label }}

      - name: Stage native installer
        shell: bash
        run: |
          set -euxo pipefail
          v='${{ steps.ver.outputs.version }}'
          out="installer/build/native"
          ls -la "$out"
          mkdir -p dist
          # jpackage печёт что-то вроде VidaInstaller-<label>-<app-version>.<ext>.
          # Приводим имя к единому виду vida-installer-<label>-<v>.<ext>.
          src=$(ls "$out"/*.${{ matrix.ext }} | head -n1)
          cp "$src" "dist/vida-installer-${{ matrix.label }}-${v}.${{ matrix.ext }}"
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-native-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  3. Сбор, checksums, Sigstore-подпись, upload в GitHub Release.
  # ---------------------------------------------------------------------------
  publish:
    name: Checksums + Sigstore + GitHub Release
    runs-on: ubuntu-latest
    needs: [build-universal, build-native]
    timeout-minutes: 30
    permissions:
      contents: write      # для upload-а в Release
      id-token: write      # для OIDC → Sigstore (keyless)
      attestations: write  # для build-provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staged

      - name: Collect into dist/
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          find staged -type f \( -name '*.jar' -o -name '*.deb' -o -name '*.msi' -o -name '*.dmg' -o -name '*.exe' -o -name '*.rpm' -o -name '*.pkg' \) -exec cp {} dist/ \;
          ls -la dist

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          set -euxo pipefail
          ( cd . && sha256sum * | sort -k2 ) > SHA256SUMS
          ( cd . && sha512sum * | sort -k2 ) > SHA512SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Sign artifacts with Sigstore (keyless OIDC)
        shell: bash
        working-directory: dist
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euxo pipefail
          for f in $(ls *.jar *.deb *.msi *.dmg 2>/dev/null); do
            cosign sign-blob --yes "$f" \
              --output-signature   "${f}.sig" \
              --output-certificate "${f}.pem"
          done
          ls -la

      - name: Build-provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.{jar,deb,msi,dmg}'

      - name: Resolve release reference
        id: ref
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/*.jar
            dist/*.deb
            dist/*.msi
            dist/*.dmg
            dist/*.sig
            dist/*.pem
            dist/SHA256SUMS
            dist/SHA512SUMS
