# -----------------------------------------------------------------------------
#  release-please + auto-release pipeline
#
#  1. Push в main → release-please создаёт/обновляет Release PR
#     (CHANGELOG + version.txt bump). Auto-merge включается сразу.
#  2. Release PR проходит CI → авто-мержится в main.
#  3. Следующий push в main → release-please видит merged release PR →
#     создаёт тег vX.Y.Z и GitHub Release.
#  4. release.yml реагирует на событие "release created" → собирает и
#     прикрепляет JAR-артефакты.
# -----------------------------------------------------------------------------

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare / publish release
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # Если release-please создал или обновил PR — включаем авто-мерж.
      # При прохождении всех required status checks PR замержится сам.
      - name: Enable auto-merge on release PR
        if: steps.release-please.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number // empty')
          if [ -n "$pr_number" ]; then
            echo "Enabling auto-merge on PR #${pr_number}"
            gh pr merge "$pr_number" --auto --squash --repo "${{ github.repository }}" || true
          fi

    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name:        ${{ steps.release-please.outputs.tag_name }}
      version:         ${{ steps.release-please.outputs.version }}
      upload_url:      ${{ steps.release-please.outputs.upload_url }}
      pr_number:       ${{ steps.release-please.outputs.pr && fromJSON(steps.release-please.outputs.pr).number || '' }}
