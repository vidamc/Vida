# -----------------------------------------------------------------------------
#  release-please
#
#  Из conventional-commits в main автоматически строит «release PR» и обновляет
#  CHANGELOG + version.txt. Когда release PR мержится, создаётся тег vX.Y.Z и
#  GitHub Release — это event, на который реагирует release.yml.
#
#  release-type: "simple" — release-please следит за корневым version.txt.
#  См. release-please-config.json / .release-please-manifest.json.
# -----------------------------------------------------------------------------

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare / publish release
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name:        ${{ steps.release-please.outputs.tag_name }}
      version:         ${{ steps.release-please.outputs.version }}
      upload_url:      ${{ steps.release-please.outputs.upload_url }}
