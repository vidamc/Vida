# -----------------------------------------------------------------------------
#  release-please + auto-release pipeline
#
#  1. Push в main → сначала полностью отрабатывает workflow «CI».
#  2. Только при успехе CI (все job’ы, включая installer-smoke и jdk-matrix) —
#     release-please создаёт/обновляет Release PR (CHANGELOG + version.txt).
#     Auto-merge на этом PR включается здесь.
#  3. Release PR снова проходит CI → авто-мерж в main.
#  4. Следующий push в main после мерджа → пункты 1–2; release-please может
#     создать тег vX.Y.Z и GitHub Release.
#  5. release.yml — по событию release → JAR-артефакты.
#
#  Ручной прогон: workflow_dispatch (без ожидания CI, на ответственность
#  того, кто нажал).
# -----------------------------------------------------------------------------

name: release-please

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare / publish release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # Если release-please создал или обновил PR — включаем авто-мерж.
      # При прохождении всех required status checks PR замержится сам.
      - name: Enable auto-merge on release PR
        if: steps.release-please.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number // empty')
          if [ -n "$pr_number" ]; then
            echo "Enabling auto-merge on PR #${pr_number}"
            gh pr merge "$pr_number" --auto --squash --repo "${{ github.repository }}" || true
          fi

    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name:        ${{ steps.release-please.outputs.tag_name }}
      version:         ${{ steps.release-please.outputs.version }}
      upload_url:      ${{ steps.release-please.outputs.upload_url }}
      pr_number:       ${{ steps.release-please.outputs.pr && fromJSON(steps.release-please.outputs.pr).number || '' }}
