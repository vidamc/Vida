# Основной путь релиза инструмента моддера: плагин dev.vida.mod → Gradle Plugin Portal.
#
# Секреты API портала: https://plugins.gradle.org/docs/submit (Plugin Publishing Plugin).
# В GitHub → Settings → Environments создайте окружение (см. env ниже) и добавьте **два секрета**:
#   GRADLE_PUBLISH_KEY    — ключ с портала
#   GRADLE_PUBLISH_SECRET — секрет с портала
#
# Окружение GitHub: по умолчанию `gradle-maven` (секреты GRADLE_PUBLISH_KEY / GRADLE_PUBLISH_SECRET).

name: publish-gradle-plugin

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Только сборка, без publishPlugins (проверка CI)"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-gradle-plugin-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  portal:
    name: Gradle Plugin Portal (dev.vida.mod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: gradle-maven
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Build plugin (tests + jar)
        shell: bash
        run: ./gradlew --no-daemon :gradle-plugin:build

      - name: publishPlugins
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          # См. https://docs.gradle.org/current/userguide/publishing_gradle_plugins.html
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          set -euxo pipefail
          ./gradlew --no-daemon :gradle-plugin:publishPlugins
