# Основной путь релиза инструмента моддера: плагин dev.vida.mod → Gradle Plugin Portal.
#
# Секреты API портала: https://plugins.gradle.org/docs/submit (Plugin Publishing Plugin).
# Секреты должны называться **точно** `GRADLE_PUBLISH_KEY` и `GRADLE_PUBLISH_SECRET`
# (как на https://plugins.gradle.org → API Keys). Их можно добавить:
#   • в Environment `gradle-maven`, или
#   • на уровне репозитория (Settings → Secrets and variables → Actions).
# Имена вроде `gradle.publish.key` в GitHub **не** подставятся в `${{ secrets.GRADLE_PUBLISH_KEY }}`.

name: publish-gradle-plugin

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Только сборка, без publishPlugins (проверка CI)"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-gradle-plugin-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  portal:
    name: Gradle Plugin Portal (dev.vida.mod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: gradle-maven
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true

      - name: Build plugin (tests + jar)
        shell: bash
        run: ./gradlew --no-daemon :gradle-plugin:build

      - name: Check Gradle Plugin Portal secrets (non-empty)
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${GRADLE_PUBLISH_KEY}" ]; then
            echo "::error::GRADLE_PUBLISH_KEY пустой. В Environment «gradle-maven» или в секретах репозитория создайте секрет с именем ровно GRADLE_PUBLISH_KEY (значение — API Key с plugins.gradle.org)."
            exit 1
          fi
          if [ -z "${GRADLE_PUBLISH_SECRET}" ]; then
            echo "::error::GRADLE_PUBLISH_SECRET пустой. Создайте секрет с именем ровно GRADLE_PUBLISH_SECRET."
            exit 1
          fi

      - name: publishPlugins
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          # https://docs.gradle.org/current/userguide/publishing_gradle_plugins.html
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          set -euxo pipefail
          # Дублируем -P: в редких CI-случаях env до publishPlugins не доходит; значения те же из секретов.
          ./gradlew --no-daemon --no-configuration-cache :gradle-plugin:publishPlugins \
            -Pgradle.publish.key="${GRADLE_PUBLISH_KEY}" \
            -Pgradle.publish.secret="${GRADLE_PUBLISH_SECRET}"
