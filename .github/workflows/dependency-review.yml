# -----------------------------------------------------------------------------
#  Dependency Review — блокирует PR, который добавляет уязвимые или
#  несовместимые по лицензии зависимости (runtime + build).
# -----------------------------------------------------------------------------

name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Мы — Apache-2.0 монорепо. Эти лицензии совместимы с распространением.
          allow-licenses: >-
            Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, EPL-2.0,
            CC0-1.0, MPL-2.0, Unlicense, 0BSD, Zlib, LGPL-2.1-or-later,
            LGPL-3.0-or-later, CDDL-1.1
          comment-summary-in-pr: on-failure
